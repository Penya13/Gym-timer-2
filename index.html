<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRAINLAB Fix</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0F0F15; color: white; -webkit-tap-highlight-color: transparent; }
        
        /* Estilo exacto de las tarjetas de los botones */
        .grid-btn { 
            background-color: #1A1A24; 
            border-radius: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 120px;
            font-weight: 900;
            text-transform: uppercase;
            transition: transform 0.1s;
        }
        .grid-btn:active { transform: scale(0.96); }

        /* Estilo corregido para el botón Builder */
        .builder-btn {
            background-color: #E2FF3B;
            color: #000;
            width: 100%;
            padding: 24px;
            border-radius: 12px; /* Un poco más cuadrado según tu captura */
            font-weight: 900;
            font-size: 1.25rem;
            text-transform: uppercase;
            margin-bottom: 24px;
            display: block;
            text-align: center;
        }

        select { appearance: none; background: transparent; text-align-last: center; outline: none; width: 100%; font-weight: 900; color: #E2FF3B; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen px-6 pt-12">

        <div v-if="screen === 'menu'" class="animate-in fade-in duration-500">
            <div class="flex justify-center mb-16">
                <h1 class="text-5xl font-black italic tracking-tighter uppercase">Train<span class="text-[#E2FF3B]">Lab</span></h1>
            </div>
            
            <button @click="screen = 'builder'" class="builder-btn">
                Builder / Mix
            </button>

            <div class="grid grid-cols-2 gap-4">
                <div @click="openQuick('AMRAP', '#D97706')" class="grid-btn text-orange-500 text-xl">AMRAP</div>
                <div @click="openQuick('FOR TIME', '#4F46E5')" class="grid-btn text-indigo-400 text-xl">FOR TIME</div>
                <div @click="openQuick('EMOM', '#9333EA')" class="grid-btn text-purple-400 text-xl text-center">EMOM</div>
                <div @click="openQuick('TABATA', '#10B981')" class="grid-btn text-emerald-400 text-xl">TABATA</div>
            </div>
        </div>

        <div v-else-if="screen === 'builder'" class="pt-10 pb-40">
            <div class="flex items-center mb-8">
                <button @click="screen = 'menu'"><i class="fas fa-arrow-left text-gray-500 text-xl"></i></button>
                <h1 class="flex-1 text-center font-black uppercase italic text-2xl tracking-tight">Builder</h1>
            </div>

            <div class="bg-[#1A1A24] rounded-3xl p-6 mb-6">
                <input v-model="routine.name" placeholder="NOMBRE DEL PLAN..." class="w-full bg-transparent text-2xl font-black mb-6 text-center outline-none border-b border-gray-800 pb-2">
                <div class="flex items-center justify-between">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Series</span>
                    <select v-model="routine.series" class="w-32 text-xl font-black">
                        <option v-for="n in 12" :value="n">{{ n }} SERIES</option>
                    </select>
                </div>
            </div>

            <div v-for="(ex, index) in routine.exercises" :key="ex.id" class="bg-[#1A1A24] rounded-3xl p-6 mb-4 relative border border-gray-800">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-[#E2FF3B] font-black italic text-xl">{{ index + 1 }}</span>
                    <input v-model="ex.name" placeholder="Ejercicio..." class="bg-[#12121A] rounded-xl px-4 py-2 flex-1 mx-3 outline-none font-bold text-sm border border-gray-800">
                    <button @click="removeExercise(index)" class="text-red-500/50"><i class="fas fa-times"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input v-model="ex.note" placeholder="Nota" class="bg-[#12121A] p-3 rounded-xl text-center text-xs font-bold outline-none border border-gray-800">
                    <select v-model="ex.restTime" class="bg-[#12121A] p-3 rounded-xl text-xs font-bold text-cyan-400 border border-gray-800">
                        <option v-for="t in [0,30,45,60,90,120]" :value="t">{{ t }}s DESC</option>
                    </select>
                </div>
            </div>

            <button @click="addExercise" class="w-full py-4 border-2 border-dashed border-gray-800 rounded-3xl text-gray-500 font-bold uppercase text-[10px] tracking-widest mb-10">+ Añadir Ejercicio</button>
            <button @click="startWorkout" class="builder-btn fixed bottom-10 left-6 right-6 w-[calc(100%-48px)]">Empezar ✓</button>
        </div>

        <div v-else-if="screen === 'play'" class="h-screen flex flex-col items-center justify-between p-10 py-20 bg-black">
            <div class="text-center w-full">
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">{{ activeMode }}</span>
                <h2 class="text-4xl font-black italic mt-4 uppercase">{{ isResting ? 'REST' : (currentEx.name || 'WORK') }}</h2>
            </div>
            <div class="text-[130px] font-black font-mono leading-none" :class="isResting ? 'text-cyan-400' : 'text-white'">
                {{ formatTime(timer) }}
            </div>
            <div class="w-full">
                <button @click="nextStep" class="w-full bg-white text-black py-8 rounded-3xl font-black text-3xl uppercase mb-4">DONE</button>
                <button @click="stopWorkout" class="w-full text-gray-600 font-bold uppercase text-xs">Finalizar</button>
            </div>
        </div>

        <div v-if="screen === 'quick_config'" class="fixed inset-0 bg-[#0F0F15] z-50 p-8">
            <div class="flex items-center mb-12">
                <button @click="screen = 'menu'"><i class="fas fa-arrow-left text-xl"></i></button>
                <h1 class="flex-1 text-center font-black uppercase italic text-2xl" :style="{color: activeColor}">{{ activeMode }}</h1>
            </div>
            
            <div class="bg-[#1A1A24] p-8 rounded-3xl text-center mb-8">
                <label class="text-[10px] font-bold text-gray-500 uppercase block mb-4">Configuración</label>
                <select v-model="quickDuration" class="text-5xl font-black">
                    <option v-for="n in 60" :value="n">{{ n }} MIN</option>
                </select>
            </div>
            
            <button @click="startQuickWorkout" class="builder-btn mt-10">Iniciar</button>
        </div>

    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    screen: 'menu', activeMode: '', activeColor: '',
                    quickDuration: 10, forTimeType: 'up',
                    routine: { name: "", series: 3, exercises: [] },
                    currentExIdx: 0, currentRound: 1, isResting: false, timer: 0, interval: null
                }
            },
            computed: { currentEx() { return this.routine.exercises[this.currentExIdx] || {}; } },
            methods: {
                openQuick(mode, color) {
                    this.activeMode = mode; this.activeColor = color; this.screen = 'quick_config';
                },
                addExercise() { this.routine.exercises.push({ id: Date.now(), name: "", note: "", restTime: 60 }); },
                removeExercise(idx) { this.routine.exercises.splice(idx, 1); },
                startQuickWorkout() {
                    this.screen = 'play'; this.timer = this.quickDuration * 60; this.runTimer();
                },
                startWorkout() {
                    if(this.routine.exercises.length === 0) return;
                    this.activeMode = 'MIX'; this.screen = 'play'; this.currentRound = 1; this.currentExIdx = 0; this.timer = 0; this.runTimer();
                },
                runTimer() {
                    clearInterval(this.interval);
                    this.interval = setInterval(() => { this.timer > 0 ? this.timer-- : this.nextStep(); }, 1000);
                },
                nextStep() { this.stopWorkout(); },
                formatTime(s) {
                    const m = Math.floor(s / 60); const sc = s % 60;
                    return `${m}:${sc.toString().padStart(2, '0')}`;
                },
                stopWorkout() { clearInterval(this.interval); this.screen = 'menu'; }
            }
        }).mount('#app');
    </script>
</body>
</html>
