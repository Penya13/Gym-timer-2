<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRAINLAB iOS 26</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;900&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --ios-bg: #000000;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #E2FF3B;
        }

        body { 
            font-family: 'SF Pro Display', 'Inter', sans-serif; 
            background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #000000 100%);
            color: white; 
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }

        /* Efecto Glassmorfismo iOS 26 */
        .ios-glass {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
        }

        .ios-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ios-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.07);
        }

        /* Botón estilo "Liquid" */
        .btn-liquid {
            background: var(--accent);
            color: black;
            font-weight: 900;
            box-shadow: 0 10px 40px rgba(226, 255, 59, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-liquid:active {
            transform: scale(0.92) translateY(4px);
            box-shadow: 0 5px 15px rgba(226, 255, 59, 0.05);
        }

        /* Ocultar scrollbar pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        select { appearance: none; background-image: none; text-align-last: center; }
    </style>
</head>
<body class="no-scrollbar">
    <div id="app" class="max-w-md mx-auto min-h-screen px-6 py-safe">
        
        <div v-if="screen === 'menu'" class="pt-20 animate-in fade-in zoom-in duration-700">
            <div class="mb-16">
                <h1 class="text-5xl font-black italic tracking-tighter text-center leading-none">TRAIN<span class="text-[#E2FF3B]">LAB</span></h1>
                <p class="text-gray-500 text-center text-[9px] uppercase tracking-[0.5em] mt-4 font-bold opacity-50">Future of Performance</p>
            </div>

            <div class="space-y-5">
                <button @click="screen = 'builder'" class="ios-glass w-full py-8 btn-liquid text-xl uppercase tracking-widest border-none">
                    Builder / Mix
                </button>
                <div class="grid grid-cols-2 gap-4">
                    <button class="ios-glass py-6 font-black text-orange-500 uppercase tracking-widest border-orange-500/20">AMRAP</button>
                    <button class="ios-glass py-6 font-black text-indigo-400 uppercase tracking-widest border-indigo-500/20">FOR TIME</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button class="ios-glass py-6 font-black text-purple-400 uppercase tracking-widest border-purple-500/20">EMOM</button>
                    <button class="ios-glass py-6 font-black text-emerald-400 uppercase tracking-widest border-emerald-500/20 text-xs">TABATA</button>
                </div>
            </div>
        </div>

        <div v-else-if="screen === 'builder'" class="pt-14 pb-44 animate-in slide-in-from-bottom duration-500">
            <div class="flex items-center justify-between mb-10">
                <button @click="screen = 'menu'" class="ios-glass w-12 h-12 flex items-center justify-center rounded-2xl"><i class="fas fa-chevron-left opacity-50"></i></button>
                <h1 class="text-lg font-black uppercase italic tracking-widest">Editor</h1>
                <div class="w-12"></div>
            </div>

            <div class="ios-glass p-8 mb-8">
                <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4 block">Rutina</label>
                <input v-model="routine.name" placeholder="NOMBRE DEL PLAN" class="w-full bg-transparent text-3xl font-black border-none outline-none placeholder:opacity-20 mb-8">
                
                <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/5">
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Series totales</span>
                    <select v-model="routine.series" class="bg-transparent text-[#E2FF3B] font-black text-xl outline-none">
                        <option v-for="n in 12" :key="n" :value="n">{{ n }}</option>
                    </select>
                </div>
            </div>

            <div v-for="(ex, index) in routine.exercises" :key="ex.id" class="ios-glass p-6 mb-6">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-10 h-10 rounded-full bg-[#E2FF3B] text-black flex items-center justify-center font-black italic">{{ index + 1 }}</div>
                    <input v-model="ex.name" placeholder="Ejercicio..." class="bg-transparent text-xl font-bold flex-1 outline-none">
                    <button @click="removeExercise(index)" class="opacity-20"><i class="fas fa-minus-circle"></i></button>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <input v-model="ex.note" placeholder="Nota / Reps" class="ios-input p-4 rounded-2xl text-center text-xs font-bold outline-none">
                    <div class="ios-input p-1 rounded-2xl flex">
                        <button @click="ex.workMode = 'libre'" :class="ex.workMode === 'libre' ? 'bg-[#E2FF3B] text-black' : 'text-gray-500'" class="flex-1 py-3 rounded-xl text-[9px] font-black uppercase transition-all">LIBRE</button>
                        <button @click="ex.workMode = 'tiempo'" :class="ex.workMode === 'tiempo' ? 'bg-[#E2FF3B] text-black' : 'text-gray-500'" class="flex-1 py-3 rounded-xl text-[9px] font-black uppercase transition-all">TIEMPO</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <div v-if="ex.workMode === 'tiempo'" class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                        <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Trabajo</span>
                        <select v-model="ex.workTime" class="bg-transparent font-black text-[#E2FF3B] text-sm">
                            <option v-for="t in [15,30,45,60,90,120,300]" :value="t">{{ t }}s</option>
                        </select>
                    </div>

                    <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                        <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Descanso</span>
                        <div class="flex items-center gap-4">
                            <button @click="ex.hasRest = !ex.hasRest" :class="ex.hasRest ? 'text-cyan-400' : 'text-gray-600'" class="text-[9px] font-black uppercase">
                                {{ ex.hasRest ? 'ON' : 'OFF' }}
                            </button>
                            <select v-if="ex.hasRest" v-model="ex.restTime" class="bg-transparent font-black text-cyan-400 text-sm">
                                <option v-for="t in [15,30,45,60,90,120,180]" :value="t">{{ t }}s</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <button @click="addExercise" class="w-full py-6 rounded-3xl border border-white/10 text-gray-500 font-black uppercase text-[10px] tracking-[0.3em] mb-12">
                + Añadir Ejercicio
            </button>

            <div class="fixed bottom-0 left-0 right-0 p-8 bg-black/60 backdrop-blur-3xl border-t border-white/5 flex gap-4">
                <button @click="startWorkout" class="w-full btn-liquid py-6 rounded-3xl text-xs uppercase tracking-[0.3em]">
                    GO SESSION
                </button>
            </div>
        </div>

        <div v-else-if="screen === 'play'" :class="isResting ? 'bg-blue-900/30' : ''" class="h-screen flex flex-col items-center justify-between p-12 transition-all duration-1000">
            <div class="text-center w-full pt-12">
                <div class="inline-block px-5 py-2 rounded-full ios-glass border-white/5 mb-8">
                    <span class="text-[10px] font-black uppercase tracking-widest text-white/50">Serie {{ currentRound }} · {{ routine.series }}</span>
                </div>
                <h2 class="text-5xl font-black italic uppercase leading-tight tracking-tighter">{{ isResting ? 'REST' : currentEx.name }}</h2>
                <p class="text-white/40 mt-6 font-bold uppercase text-xs tracking-widest">{{ currentEx.note }}</p>
            </div>

            <div class="text-[160px] font-black font-mono leading-none tracking-tighter tabular-nums" :class="isResting ? 'text-cyan-400' : 'text-[#E2FF3B]'">
                {{ formatTime(timer) }}
            </div>

            <div class="w-full space-y-6 pb-12">
                <button @click="nextStep" class="w-full bg-white text-black py-8 rounded-[40px] font-black text-3xl uppercase tracking-tighter shadow-[0_20px_50px_rgba(255,255,255,0.15)] active:scale-95 transition-all">
                    {{ isResting ? 'SKIP' : 'DONE' }}
                </button>
                <button @click="stopWorkout" class="w-full text-white/20 font-black uppercase text-[9px] tracking-[0.4em]">Abortar Misión</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    screen: 'menu',
                    // Nueva clave v2026
                    routine: JSON.parse(localStorage.getItem('trainlab_2026')) || { name: "", series: 3, exercises: [] },
                    currentExIdx: 0,
                    currentRound: 1,
                    isResting: false,
                    timer: 0,
                    interval: null
                }
            },
            watch: {
                routine: { handler(val) { localStorage.setItem('trainlab_2026', JSON.stringify(val)); }, deep: true }
            },
            methods: {
                addExercise() {
                    this.routine.exercises.push({ id: Date.now(), name: "", note: "", workMode: "libre", workTime: 30, hasRest: true, restTime: 60 });
                },
                removeExercise(idx) { this.routine.exercises.splice(idx, 1); },
                formatTime(s) {
                    const m = Math.floor(s / 60);
                    const sc = s % 60;
                    return `${m}:${sc.toString().padStart(2, '0')}`;
                },
                startWorkout() {
                    if(this.routine.exercises.length === 0) return;
                    this.screen = 'play';
                    this.currentExIdx = 0;
                    this.currentRound = 1;
                    this.isResting = false;
                    this.setupPhase();
                    this.runTimer();
                },
                setupPhase() {
                    if (this.isResting) {
                        this.timer = this.currentEx.restTime;
                    } else {
                        this.timer = this.currentEx.workMode === 'tiempo' ? this.currentEx.workTime : 0;
                    }
                },
                runTimer() {
                    clearInterval(this.interval);
                    this.interval = setInterval(() => {
                        if (this.isResting || this.currentEx.workMode === 'tiempo') {
                            if (this.timer > 0) this.timer--;
                            else this.nextStep();
                        } else {
                            this.timer++;
                        }
                    }, 1000);
                },
                nextStep() {
                    if (!this.isResting) {
                        if (this.currentEx.hasRest) {
                            this.isResting = true;
                            this.timer = this.currentEx.restTime;
                        } else {
                            this.moveToNext();
                        }
                    } else {
                        this.moveToNext();
                    }
                },
                moveToNext() {
                    this.isResting = false;
                    if (this.currentExIdx < this.routine.exercises.length - 1) {
                        this.currentExIdx++;
                    } else if (this.currentRound < this.routine.series) {
                        this.currentExIdx = 0;
                        this.currentRound++;
                    } else {
                        this.stopWorkout();
                        alert("ULTRA PERFORMANCE ACHIEVED.");
                        return;
                    }
                    this.setupPhase();
                },
                stopWorkout() { clearInterval(this.interval); this.screen = 'menu'; }
            }
        }).mount('#app');
    </script>
</body>
</html>
