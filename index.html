<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRAINLAB v2026.4</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #E2FF3B; --glass: rgba(255, 255, 255, 0.06); }
        body { font-family: 'SF Pro Display', sans-serif; background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #000000 100%); color: white; min-height: 100vh; overflow: hidden; }
        .ios-glass { background: var(--glass); backdrop-filter: blur(25px) saturate(180%); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; }
        .btn-liquid { background: var(--accent); color: black; font-weight: 900; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-cooldown { background: #ef4444 !important; transform: scale(0.95); }
        select { appearance: none; background: transparent; text-align-last: center; outline: none; width: 100%; font-weight: 900; color: var(--accent); }
        option { background: #1a1a2e; color: white; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen px-6">

        <div v-if="screen === 'menu'" class="pt-20 animate-in fade-in duration-700">
            <div class="mb-16 text-center">
                <h1 class="text-5xl font-black italic tracking-tighter uppercase">Train<span class="text-[#E2FF3B]">Lab</span></h1>
                <p class="text-gray-500 text-[9px] uppercase tracking-[0.5em] mt-4 font-bold opacity-50">Precision Training</p>
            </div>
            <div class="space-y-4">
                <button @click="screen = 'builder'" class="w-full py-8 btn-liquid rounded-[32px] text-xl uppercase tracking-widest">Builder / Mix</button>
                <div class="grid grid-cols-2 gap-4">
                    <button @click="openQuick('AMRAP', '#D97706')" class="ios-glass py-6 font-black text-orange-500 uppercase">AMRAP</button>
                    <button @click="openQuick('FOR TIME', '#4F46E5')" class="ios-glass py-6 font-black text-indigo-400 uppercase">FOR TIME</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button @click="openQuick('EMOM', '#9333EA')" class="ios-glass py-6 font-black text-purple-400 uppercase">EMOM</button>
                    <button @click="openQuick('TABATA', '#10B981')" class="ios-glass py-6 font-black text-emerald-400 uppercase text-xs">TABATA</button>
                </div>
            </div>
        </div>

        <div v-else-if="screen === 'quick_config'" class="pt-14 animate-in slide-in-from-bottom">
            <div class="flex items-center justify-between mb-10">
                <button @click="screen = 'menu'" class="ios-glass w-12 h-12 flex items-center justify-center rounded-2xl"><i class="fas fa-chevron-left"></i></button>
                <h1 class="text-xl font-black italic uppercase" :style="{color: activeColor}">{{ activeMode }}</h1>
                <div class="w-12"></div>
            </div>

            <div class="space-y-4">
                <div v-if="activeMode === 'FOR TIME'" class="grid grid-cols-2 gap-3 mb-4">
                    <button @click="forTimeType = 'up'" :class="forTimeType === 'up' ? 'btn-liquid' : 'ios-glass'" class="py-4 rounded-2xl font-black text-[10px] uppercase">Chrono (Up)</button>
                    <button @click="forTimeType = 'down'" :class="forTimeType === 'down' ? 'btn-liquid' : 'ios-glass'" class="py-4 rounded-2xl font-black text-[10px] uppercase">Time Cap (Down)</button>
                </div>

                <div v-if="activeMode === 'AMRAP' || (activeMode === 'FOR TIME' && forTimeType === 'down')" class="ios-glass p-6">
                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-4">Tiempo Límite</label>
                    <select v-model="quickDuration" class="text-4xl">
                        <option v-for="n in [5,7,10,12,15,20,30,45]" :value="n">{{ n }} MIN</option>
                    </select>
                </div>

                <div v-if="activeMode === 'EMOM'" class="ios-glass p-6 space-y-8">
                    <div>
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-4">Intervalo (Cada...)</label>
                        <select v-model="emomInterval" class="text-3xl">
                            <option v-for="s in emomOptions" :value="s.val">{{ s.label }}</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-4">Rondas</label>
                        <select v-model="quickRounds" class="text-3xl">
                            <option v-for="n in 30" :value="n">{{ n }} RONDAS</option>
                        </select>
                    </div>
                </div>

                <div v-if="activeMode === 'TABATA'" class="ios-glass p-6 space-y-6">
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-2 text-center">Work</label>
                            <select v-model="tabataWork" class="text-xl bg-white/5 p-3 rounded-2xl">{{ tabataWork }}s</select>
                        </div>
                        <div class="flex-1">
                            <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-2 text-center text-cyan-500">Rest</label>
                            <select v-model="tabataRest" class="text-xl bg-white/5 p-3 rounded-2xl text-cyan-400">{{ tabataRest }}s</select>
                        </div>
                    </div>
                    <select v-model="quickRounds" class="text-2xl mt-4">
                        <option v-for="n in [8,12,16,20,24]" :value="n">{{ n }} RONDAS</option>
                    </select>
                </div>
            </div>

            <button @click="startQuickWorkout" class="btn-liquid w-full py-6 rounded-[32px] mt-10 text-xl uppercase tracking-widest shadow-2xl">Start</button>
        </div>

        <div v-else-if="screen === 'play'" :class="isResting ? 'bg-blue-900/30' : ''" class="h-screen flex flex-col items-center justify-between p-10 py-20">
            <div class="text-center w-full">
                <span class="ios-glass px-4 py-1 text-[9px] font-black uppercase text-white/50 tracking-[0.2em]">{{ activeMode }}</span>
                
                <div v-if="activeMode === 'AMRAP'" class="mt-8">
                    <h2 class="text-7xl font-black text-orange-500 italic leading-none">{{ rounds }}</h2>
                    <p class="text-[10px] font-black text-gray-600 uppercase mt-2 tracking-widest">Rounds Complete</p>
                </div>

                <div v-else class="mt-8">
                    <h2 class="text-3xl font-black italic uppercase text-white">{{ isResting ? 'REST' : 'WORK' }}</h2>
                    <p v-if="activeMode !== 'FOR TIME'" class="text-[10px] font-black text-gray-600 uppercase mt-2">Ronda {{ currentRound }} / {{ quickRounds }}</p>
                </div>
            </div>

            <div class="text-[140px] font-black font-mono leading-none tracking-tighter tabular-nums" :class="isResting ? 'text-cyan-400' : 'text-white'">
                {{ formatTime(timer) }}
            </div>

            <div class="w-full space-y-6">
                <div v-if="activeMode === 'AMRAP'" class="space-y-4">
                    <button @click="addRound" :class="{'btn-cooldown': cooldown}" class="w-full py-10 rounded-[45px] btn-liquid text-4xl uppercase tracking-widest flex flex-col items-center shadow-2xl transition-all">
                        <span v-if="!cooldown">+1</span>
                        <span v-else class="text-sm opacity-50">...</span>
                    </button>
                    <button @click="stopWorkout" class="w-full py-4 text-gray-600 font-black uppercase text-[10px] tracking-widest">Finalizar y Guardar</button>
                </div>

                <div v-else class="space-y-4">
                    <button @click="nextStep" class="w-full bg-white text-black py-8 rounded-[45px] font-black text-3xl uppercase tracking-tighter shadow-2xl active:scale-95 transition-all">
                        {{ isResting ? 'SKIP' : 'DONE' }}
                    </button>
                    <button @click="stopWorkout" class="w-full text-white/20 font-black uppercase text-[9px] tracking-[0.4em]">Finalizar</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    screen: 'menu',
                    activeMode: '', activeColor: '',
                    quickDuration: 10, quickRounds: 8,
                    forTimeType: 'up', // 'up' (infinito) o 'down' (cap)
                    emomInterval: 60, tabataWork: 20, tabataRest: 10,
                    rounds: 0, cooldown: false,
                    currentRound: 1, isResting: false, timer: 0,
                    interval: null,
                    // Generador de intervalos 15s en 15s (1m a 5m)
                    emomOptions: [
                        {val:60, label:'1:00'}, {val:75, label:'1:15'}, {val:90, label:'1:30'}, {val:105, label:'1:45'},
                        {val:120, label:'2:00'}, {val:135, label:'2:15'}, {val:150, label:'2:30'}, {val:180, label:'3:00'},
                        {val:240, label:'4:00'}, {val:300, label:'5:00'}
                    ]
                }
            },
            methods: {
                openQuick(mode, color) {
                    this.activeMode = mode; this.activeColor = color; this.screen = 'quick_config';
                    this.rounds = 0;
                },
                addRound() {
                    if(!this.cooldown) {
                        this.rounds++; this.cooldown = true;
                        setTimeout(() => this.cooldown = false, 1500);
                    }
                },
                startQuickWorkout() {
                    this.screen = 'play'; this.currentRound = 1; this.isResting = false;
                    if(this.activeMode === 'AMRAP') this.timer = this.quickDuration * 60;
                    else if(this.activeMode === 'FOR TIME') {
                        this.timer = (this.forTimeType === 'down') ? this.quickDuration * 60 : 0;
                    }
                    else if(this.activeMode === 'EMOM') this.timer = this.emomInterval;
                    else if(this.activeMode === 'TABATA') this.timer = this.tabataWork;
                    this.runTimer();
                },
                runTimer() {
                    clearInterval(this.interval);
                    this.interval = setInterval(() => {
                        // Lógica de cuenta atrás
                        if(this.isResting || this.activeMode === 'AMRAP' || this.activeMode === 'EMOM' || this.activeMode === 'TABATA' || (this.activeMode === 'FOR TIME' && this.forTimeType === 'down')) {
                            if(this.timer > 0) this.timer--; else this.nextStep();
                        } else {
                            // Lógica de cuenta adelante (FOR TIME UP)
                            this.timer++;
                        }
                    }, 1000);
                },
                nextStep() {
                    if(this.activeMode === 'EMOM') {
                        this.currentRound++;
                        if(this.currentRound > this.quickRounds) this.stopWorkout();
                        else this.timer = this.emomInterval;
                    } else if(this.activeMode === 'TABATA') {
                        if(!this.isResting) { this.isResting = true; this.timer = this.tabataRest; }
                        else { 
                            this.isResting = false; this.timer = this.tabataWork; this.currentRound++;
                            if(this.currentRound > this.quickRounds) this.stopWorkout();
                        }
                    } else if(this.activeMode === 'FOR TIME' || this.activeMode === 'AMRAP') {
                        if(this.timer === 0) this.stopWorkout(); // Auto-stop en cap
                    }
                },
                formatTime(s) {
                    const m = Math.floor(s / 60); const sc = s % 60;
                    return `${m}:${sc.toString().padStart(2, '0')}`;
                },
                stopWorkout() { clearInterval(this.interval); this.screen = 'menu'; }
            }
        }).mount('#app');
    </script>
</body>
</html>
