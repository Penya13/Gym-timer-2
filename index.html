<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRAINLAB DEBUG MODE</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #E2FF3B; --glass: rgba(255, 255, 255, 0.08); }
        body { font-family: 'SF Pro Display', sans-serif; background: #000; color: white; min-height: 100vh; overflow-x: hidden; }
        .ios-glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; }
        .btn-liquid { background: var(--accent); color: black; font-weight: 900; border-radius: 24px; transition: all 0.2s; }
        .btn-liquid:active { transform: scale(0.95); }
        select { appearance: none; background: transparent; text-align-last: center; outline: none; width: 100%; font-weight: 800; color: var(--accent); }
        option { background: #111; color: white; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen px-6">

        <div v-if="screen === 'menu'" class="pt-20 animate-in fade-in">
            <h1 class="text-4xl font-black italic text-center mb-12 uppercase italic">Train<span class="text-[#E2FF3B]">Lab</span></h1>
            <div class="space-y-4">
                <button @click="screen = 'builder'" class="w-full py-7 btn-liquid text-xl uppercase tracking-widest shadow-xl">Builder / Mix</button>
                <div class="grid grid-cols-2 gap-4">
                    <button @click="openQuick('AMRAP', '#D97706')" class="ios-glass py-6 font-black text-orange-500 uppercase">AMRAP</button>
                    <button @click="openQuick('FOR TIME', '#4F46E5')" class="ios-glass py-6 font-black text-indigo-400 uppercase">FOR TIME</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button @click="openQuick('EMOM', '#9333EA')" class="ios-glass py-6 font-black text-purple-400 uppercase">EMOM</button>
                    <button @click="openQuick('TABATA', '#10B981')" class="ios-glass py-6 font-black text-emerald-400 uppercase">TABATA</button>
                </div>
            </div>
        </div>

        <div v-else-if="screen === 'quick_config'" class="pt-10 pb-20">
            <div class="flex items-center mb-8">
                <button @click="screen = 'menu'"><i class="fas fa-chevron-left text-xl"></i></button>
                <h1 class="flex-1 text-center font-black uppercase italic" :style="{color: activeColor}">{{ activeMode }}</h1>
            </div>

            <div class="space-y-4">
                <div v-if="activeMode === 'AMRAP' || activeMode === 'FOR TIME'" class="ios-glass p-6">
                    <div v-if="activeMode === 'FOR TIME'" class="flex gap-2 mb-6">
                        <button @click="forTimeType = 'up'" :class="forTimeType === 'up' ? 'bg-[#E2FF3B] text-black' : 'bg-white/5'" class="flex-1 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">Cronómetro</button>
                        <button @click="forTimeType = 'down'" :class="forTimeType === 'down' ? 'bg-[#E2FF3B] text-black' : 'bg-white/5'" class="flex-1 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">Time Cap</button>
                    </div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase tracking-widest block mb-2 text-center">Duración (Minutos)</label>
                    <select v-model="quickDuration" class="text-5xl">
                        <option v-for="n in 60" :value="n">{{ n }} MIN</option>
                    </select>
                </div>

                <div v-if="activeMode === 'EMOM'" class="ios-glass p-6 space-y-6">
                    <div>
                        <label class="text-[9px] font-bold text-gray-500 uppercase tracking-widest block mb-2 text-center">Intervalo</label>
                        <select v-model="emomInterval" class="text-4xl">
                            <option v-for="s in emomOptions" :value="s.val">{{ s.label }}</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-gray-500 uppercase tracking-widest block mb-2 text-center">Rondas Totales</label>
                        <select v-model="quickRounds" class="text-4xl">
                            <option v-for="n in 30" :value="n">{{ n }} RD</option>
                        </select>
                    </div>
                </div>

                <div v-if="activeMode === 'TABATA'" class="ios-glass p-6 space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <label class="text-[9px] font-bold text-gray-500 uppercase block mb-2">Work (s)</label>
                            <select v-model="tabataWork" class="text-3xl bg-white/5 rounded-2xl py-2">{{ tabataWork }}</select>
                        </div>
                        <div class="text-center">
                            <label class="text-[9px] font-bold text-gray-500 uppercase block mb-2">Rest (s)</label>
                            <select v-model="tabataRest" class="text-3xl bg-white/5 rounded-2xl py-2 text-cyan-400">{{ tabataRest }}</select>
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-gray-500 uppercase block mb-2 text-center">Rondas</label>
                        <select v-model="quickRounds" class="text-3xl">
                            <option v-for="n in [8,12,16,20,24,30]" :value="n">{{ n }}</option>
                        </select>
                    </div>
                </div>
            </div>

            <button @click="startQuickWorkout" class="btn-liquid w-full py-6 mt-10 text-xl uppercase tracking-widest shadow-2xl">Start</button>
        </div>

        <div v-else-if="screen === 'builder'" class="pt-10 pb-40">
            <div class="flex items-center mb-8">
                <button @click="screen = 'menu'"><i class="fas fa-chevron-left text-xl"></i></button>
                <h1 class="flex-1 text-center font-black uppercase italic">Custom Builder</h1>
            </div>
            
            <div class="ios-glass p-6 mb-6">
                <input v-model="routine.name" placeholder="Nombre..." class="w-full bg-transparent text-2xl font-black mb-4 text-center outline-none">
                <div class="flex items-center justify-between border-t border-white/5 pt-4">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Series</span>
                    <select v-model="routine.series" class="w-20 text-xl">
                        <option v-for="n in 10" :value="n">{{ n }}</option>
                    </select>
                </div>
            </div>

            <div v-for="(ex, index) in routine.exercises" :key="ex.id" class="ios-glass p-5 mb-4 relative">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-[#E2FF3B] font-black italic">{{ index + 1 }}</span>
                    <input v-model="ex.name" placeholder="Ejercicio..." class="bg-transparent text-lg font-bold outline-none flex-1 mx-4">
                    <button @click="removeExercise(index)" class="text-red-500/40">×</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input v-model="ex.note" placeholder="Nota" class="bg-white/5 p-3 rounded-xl text-xs text-center border-none outline-none">
                    <select v-model="ex.restTime" class="bg-white/5 p-3 rounded-xl text-xs text-cyan-400">
                        <option v-for="t in [0,30,45,60,90,120]" :value="t">{{ t }}s DESC</option>
                    </select>
                </div>
            </div>

            <button @click="addExercise" class="w-full py-4 border-2 border-dashed border-white/10 rounded-3xl text-gray-600 font-bold uppercase text-[10px] tracking-widest mb-4">+ Añadir</button>
            <button @click="startWorkout" class="fixed bottom-10 left-6 right-6 py-6 btn-liquid text-xl uppercase tracking-widest shadow-2xl">Empezar</button>
        </div>

        <div v-else-if="screen === 'play'" :class="isResting ? 'bg-blue-900/30' : ''" class="h-screen flex flex-col items-center justify-between p-12 transition-all">
            <div class="text-center w-full pt-10">
                <span class="ios-glass px-4 py-1 text-[9px] font-black uppercase text-white/40">{{ activeMode }}</span>
                <h2 class="text-4xl font-black italic uppercase mt-6">{{ isResting ? 'REST' : (currentEx.name || activeMode) }}</h2>
                <p v-if="activeMode === 'AMRAP'" class="text-6xl font-black text-orange-500 mt-4">{{ rounds }}</p>
                <p v-else class="text-xs font-bold mt-2 opacity-50">Ronda {{ currentRound }} / {{ activeMode === 'MIX' ? routine.series : quickRounds }}</p>
            </div>

            <div class="text-[120px] font-black font-mono tabular-nums" :class="isResting ? 'text-cyan-400' : 'text-white'">
                {{ formatTime(timer) }}
            </div>

            <div class="w-full space-y-4 pb-10">
                <button v-if="activeMode === 'AMRAP'" @click="addRound" :class="{'bg-red-500': cooldown}" class="w-full py-10 btn-liquid text-4xl shadow-2xl transition-all">
                    {{ cooldown ? '...' : '+1' }}
                </button>
                <button v-else @click="nextStep" class="w-full bg-white text-black py-7 rounded-[40px] font-black text-2xl uppercase tracking-tighter">
                    {{ isResting ? 'SKIP' : 'DONE' }}
                </button>
                <button @click="stopWorkout" class="w-full text-white/20 font-black uppercase text-[10px] tracking-widest">Finalizar</button>
            </div>
        </div>

    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                // GENERADOR DE OPCIONES EMOM (15 en 15 hasta 5min)
                const opts = [];
                for(let s=60; s<=300; s+=15) {
                    const m = Math.floor(s/60);
                    const sc = s%60;
                    opts.push({ val: s, label: `${m}:${sc.toString().padStart(2,'0')}` });
                }

                return {
                    screen: 'menu',
                    activeMode: '', activeColor: '',
                    quickDuration: 10, quickRounds: 8,
                    forTimeType: 'up',
                    emomInterval: 60, emomOptions: opts,
                    tabataWork: 20, tabataRest: 10,
                    rounds: 0, cooldown: false,
                    currentRound: 1, isResting: false, timer: 0, interval: null,
                    routine: { name: "", series: 3, exercises: [] }
                }
            },
            methods: {
                openQuick(mode, color) {
                    this.activeMode = mode; this.activeColor = color; this.screen = 'quick_config';
                    this.rounds = 0;
                },
                addExercise() { this.routine.exercises.push({ id: Date.now(), name: "", note: "", restTime: 60 }); },
                removeExercise(idx) { this.routine.exercises.splice(idx, 1); },
                addRound() { if(!this.cooldown) { this.rounds++; this.cooldown = true; setTimeout(() => this.cooldown = false, 1500); } },
                startQuickWorkout() {
                    this.screen = 'play'; this.currentRound = 1; this.isResting = false;
                    if(this.activeMode === 'AMRAP') this.timer = this.quickDuration * 60;
                    else if(this.activeMode === 'FOR TIME') this.timer = this.forTimeType === 'down' ? this.quickDuration * 60 : 0;
                    else if(this.activeMode === 'EMOM') this.timer = this.emomInterval;
                    else if(this.activeMode === 'TABATA') this.timer = this.tabataWork;
                    this.runTimer();
                },
                startWorkout() {
                    if(this.routine.exercises.length === 0) return;
                    this.activeMode = 'MIX'; this.screen = 'play'; this.currentRound = 1; this.currentExIdx = 0; this.timer = 0;
                    this.runTimer();
                },
                runTimer() {
                    clearInterval(this.interval);
                    this.interval = setInterval(() => {
                        const isDown = this.isResting || ['AMRAP','EMOM','TABATA'].includes(this.activeMode) || (this.activeMode === 'FOR TIME' && this.forTimeType === 'down');
                        if(isDown) { if(this.timer > 0) this.timer--; else this.nextStep(); }
                        else this.timer++;
                    }, 1000);
                },
                nextStep() {
                    if(this.activeMode === 'EMOM') {
                        this.currentRound++;
                        if(this.currentRound > this.quickRounds) this.stopWorkout();
                        else this.timer = this.emomInterval;
                    } else if(this.activeMode === 'TABATA') {
                        if(!this.isResting) { this.isResting = true; this.timer = this.tabataRest; }
                        else { this.isResting = false; this.timer = this.tabataWork; this.currentRound++; if(this.currentRound > this.quickRounds) this.stopWorkout(); }
                    } else if(this.activeMode === 'MIX') {
                        if(!this.isResting && this.currentEx.restTime > 0) { this.isResting = true; this.timer = this.currentEx.restTime; }
                        else {
                            this.isResting = false; this.timer = 0;
                            if(this.currentExIdx < this.routine.exercises.length - 1) this.currentExIdx++;
                            else if(this.currentRound < this.routine.series) { this.currentExIdx = 0; this.currentRound++; }
                            else this.stopWorkout();
                        }
                    } else { this.stopWorkout(); }
                },
                formatTime(s) {
                    const m = Math.floor(s / 60); const sc = s % 60;
                    return `${m}:${sc.toString().padStart(2, '0')}`;
                },
                stopWorkout() { clearInterval(this.interval); this.screen = 'menu'; }
            },
            computed: { currentEx() { return this.routine.exercises[this.currentExIdx] || {}; } }
        }).mount('#app');
    </script>
</body>
</html>
