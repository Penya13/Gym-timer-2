<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRAINLAB iOS 26 - Elite</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;900&family=Inter:wght@400;700;900&display=swap');
        :root { --ios-bg: #000000; --glass: rgba(255, 255, 255, 0.06); --accent: #E2FF3B; }
        body { font-family: 'SF Pro Display', sans-serif; background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #000000 100%); color: white; min-height: 100vh; overflow-x: hidden; }
        .ios-glass { background: var(--glass); backdrop-filter: blur(25px) saturate(180%); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; }
        .btn-liquid { background: var(--accent); color: black; font-weight: 900; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-cooldown { background: #ef4444 !important; transform: scale(0.95); opacity: 0.8; }
        select { appearance: none; background: transparent; text-align-last: center; outline: none; width: 100%; font-weight: 900; color: var(--accent); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen px-6">

        <div v-if="screen === 'menu'" class="pt-20 animate-in fade-in duration-700">
            <div class="mb-16 text-center">
                <h1 class="text-5xl font-black italic tracking-tighter uppercase">Train<span class="text-[#E2FF3B]">Lab</span></h1>
                <p class="text-gray-500 text-[9px] uppercase tracking-[0.5em] mt-4 font-bold opacity-50">Advanced Performance</p>
            </div>
            <div class="space-y-4">
                <button @click="screen = 'builder'" class="w-full py-8 btn-liquid rounded-[32px] text-xl uppercase tracking-widest">Builder / Mix</button>
                <div class="grid grid-cols-2 gap-4">
                    <button @click="openQuick('AMRAP', '#D97706')" class="ios-glass py-6 font-black text-orange-500 uppercase">AMRAP</button>
                    <button @click="openQuick('FOR TIME', '#4F46E5')" class="ios-glass py-6 font-black text-indigo-400 uppercase">FOR TIME</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button @click="openQuick('EMOM', '#9333EA')" class="ios-glass py-6 font-black text-purple-400 uppercase">EMOM</button>
                    <button @click="openQuick('TABATA', '#10B981')" class="ios-glass py-6 font-black text-emerald-400 uppercase">TABATA</button>
                </div>
            </div>
        </div>

        <div v-else-if="screen === 'quick_config'" class="pt-14 pb-10">
            <div class="flex items-center justify-between mb-10">
                <button @click="screen = 'menu'" class="ios-glass w-12 h-12 flex items-center justify-center rounded-2xl"><i class="fas fa-chevron-left"></i></button>
                <h1 class="text-xl font-black italic uppercase" :style="{color: activeColor}">{{ activeMode }}</h1>
                <div class="w-12"></div>
            </div>

            <div class="space-y-4">
                <div v-if="activeMode === 'AMRAP' || activeMode === 'FOR TIME'" class="ios-glass p-6">
                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-4">Tiempo Total (Minutos)</label>
                    <select v-model="quickDuration" class="text-4xl">
                        <option v-for="n in [5,7,10,12,15,20,30,45]" :value="n">{{ n }} MIN</option>
                    </select>
                </div>

                <div v-if="activeMode === 'EMOM' || activeMode === 'TABATA'" class="ios-glass p-6 space-y-6">
                    <div v-if="activeMode === 'EMOM'">
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-2">Cada (Intervalo)</label>
                        <select v-model="emomInterval" class="text-2xl">
                            <option :value="60">1:00 MIN</option>
                            <option :value="90">1:30 MIN</option>
                            <option :value="120">2:00 MIN</option>
                        </select>
                    </div>
                    <div v-if="activeMode === 'TABATA'">
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-2">On / Off (Segundos)</label>
                        <div class="flex gap-4">
                            <select v-model="tabataWork" class="text-xl bg-white/5 rounded-xl p-2">
                                <option v-for="s in [10,20,30,40]" :value="s">{{s}}s ON</option>
                            </select>
                            <select v-model="tabataRest" class="text-xl bg-white/5 rounded-xl p-2 text-cyan-400">
                                <option v-for="s in [10,15,20,30]" :value="s">{{s}}s OFF</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-2">Rondas Totales</label>
                        <select v-model="quickRounds" class="text-2xl">
                            <option v-for="n in [4,8,10,12,16,20,24]" :value="n">{{ n }} RONDAS</option>
                        </select>
                    </div>
                </div>
            </div>

            <button @click="startQuickWorkout" class="btn-liquid w-full py-6 rounded-[32px] mt-10 text-xl uppercase tracking-widest">Start</button>
        </div>

        <div v-else-if="screen === 'play'" :class="isResting ? 'bg-blue-900/30' : ''" class="h-screen flex flex-col items-center justify-between p-10 py-20">
            <div class="text-center w-full">
                <span class="ios-glass px-4 py-1 text-[9px] font-black uppercase text-white/50">{{ activeMode }}</span>
                <h2 v-if="activeMode === 'AMRAP'" class="text-6xl font-black mt-6 text-orange-500">{{ rounds }}</h2>
                <h2 v-else class="text-3xl font-black italic uppercase mt-6">{{ isResting ? 'REST' : 'WORK' }}</h2>
                <p v-if="activeMode === 'EMOM' || activeMode === 'TABATA'" class="text-xs font-bold mt-2 opacity-50">Ronda {{ currentRound }} / {{ quickRounds }}</p>
            </div>

            <div class="text-[140px] font-black font-mono leading-none tracking-tighter" :class="isResting ? 'text-cyan-400' : 'text-white'">
                {{ formatTime(timer) }}
            </div>

            <div v-if="activeMode === 'AMRAP'" class="w-full">
                <button @click="addRound" :class="{'btn-cooldown': cooldown}" class="w-full py-10 rounded-[40px] btn-liquid text-4xl uppercase tracking-widest flex flex-col items-center">
                    <span v-if="!cooldown">ROUND +1</span>
                    <span v-else class="text-sm">WAIT...</span>
                </button>
            </div>

            <div v-else class="w-full space-y-4">
                <button @click="nextStep" class="w-full bg-white text-black py-8 rounded-[40px] font-black text-3xl uppercase tracking-tighter active:scale-95">
                    {{ isResting ? 'SKIP' : 'DONE' }}
                </button>
                <button @click="stopWorkout" class="w-full text-white/20 font-black uppercase text-[9px] tracking-[0.4em]">Stop</button>
            </div>
        </div>

    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    screen: 'menu',
                    activeMode: '', activeColor: '',
                    quickDuration: 10, quickRounds: 8,
                    emomInterval: 60, tabataWork: 20, tabataRest: 10,
                    rounds: 0, cooldown: false,
                    currentRound: 1, isResting: false, timer: 0,
                    interval: null,
                    routine: { exercises: [] } // Placeholder para el builder
                }
            },
            methods: {
                openQuick(mode, color) {
                    this.activeMode = mode; this.activeColor = color; this.screen = 'quick_config';
                    this.rounds = 0;
                },
                addRound() {
                    if(!this.cooldown) {
                        this.rounds++; this.cooldown = true;
                        setTimeout(() => this.cooldown = false, 2000);
                    }
                },
                startQuickWorkout() {
                    this.screen = 'play'; this.currentRound = 1; this.isResting = false;
                    if(this.activeMode === 'AMRAP') this.timer = this.quickDuration * 60;
                    else if(this.activeMode === 'FOR TIME') this.timer = this.quickDuration * 60;
                    else if(this.activeMode === 'EMOM') this.timer = this.emomInterval;
                    else if(this.activeMode === 'TABATA') this.timer = this.tabataWork;
                    this.runTimer();
                },
                runTimer() {
                    clearInterval(this.interval);
                    this.interval = setInterval(() => {
                        if(this.activeMode === 'FOR TIME' || this.activeMode === 'AMRAP' || this.isResting) {
                            if(this.timer > 0) this.timer--; else this.nextStep();
                        } else if(this.activeMode === 'EMOM') {
                            if(this.timer > 0) this.timer--; else { this.timer = this.emomInterval; this.currentRound++; if(this.currentRound > this.quickRounds) this.stopWorkout(); }
                        } else if(this.activeMode === 'TABATA') {
                            if(this.timer > 0) this.timer--; else this.nextStep();
                        }
                    }, 1000);
                },
                nextStep() {
                    if(this.activeMode === 'TABATA') {
                        if(!this.isResting) { this.isResting = true; this.timer = this.tabataRest; }
                        else { this.isResting = false; this.timer = this.tabataWork; this.currentRound++; }
                        if(this.currentRound > this.quickRounds) this.stopWorkout();
                    } else if(this.activeMode === 'FOR TIME' || this.activeMode === 'AMRAP') {
                        this.stopWorkout();
                    }
                },
                formatTime(s) {
                    const m = Math.floor(s / 60); const sc = s % 60;
                    return `${m}:${sc.toString().padStart(2, '0')}`;
                },
                stopWorkout() { clearInterval(this.interval); this.screen = 'menu'; }
            }
        }).mount('#app');
    </script>
</body>
</html>
